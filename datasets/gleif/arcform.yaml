# The `source.gleif` Protocol — the reproducible *definition* of how the GLEIF Legal
# Entity Identifier Dataset is ingested from the official GLEIF golden copy. `arc run`
# executes this manifest; one Run → one Dataset version (the freshness lever). See
# ./README.md (the Protocol primitive).
#
# MOSTLY-CONFIG. The terminal COPY is now parquet_export; datapackage_describe emits the
# descriptor from the built Parquet; finetype_validate gates it against the self-derived
# finetype contract. The FETCH is still an opaque `command:` step by design — see its
# note: the golden copy is republished DAILY and its URL is resolved at run time from a
# JSON API (not an HTML index), so it is neither a stable pinnable URL nor an
# html_link_discover target; and it is a ~470 MB zip. Converting it to typed operators
# would misrepresent a JSON-API lookup as link discovery and buy nothing, so the fetch
# stays a script. Everything downstream of the raw CSV is first-class config.
#
# BOUNDARY — do NOT fold this into this manifest:
#   • PUBLISH (content-addressed R2 upload + manifest/catalog pointer flip) stays in
#     the out-of-repo publish pipeline and READS this Protocol's terminal output,
#     build/gleif.parquet + the emitted datapackage.json. It is not an arcform step.
#
# Produces: build/gleif.parquet  →  published as source.gleif
name: gleif
engine: duckdb
engine_version: ">=1.2"
db: build/gleif.db

# Transient API/network blips shouldn't sink a run — retry fetches with backoff.
defaults:
  retry:
    max_attempts: 3
    backoff_sec: 2.0

steps:
  # ── Fetch: resolve the latest golden-copy full CSV, download (~470 MB zip), unzip ─
  # OPAQUE BY DESIGN (see the manifest header): the helper resolves the current
  # full-file CSV URL from the GLEIF publishes JSON API, then downloads + unzips it. The
  # golden copy is republished daily — the URL is not stable and not an html href — so
  # this is left as a script rather than forced into http_fetch/html_link_discover.
  - name: fetch_gleif
    command: "bash scripts/fetch_gleif.sh build/gleif_src"
    produces: [gleif_raw]
    preconditions:
      - modified_after: { path: build/gleif_src, period: 24h }

  # ── Load + normalise: the published 10-field schema (dates sliced from ISO ts) ───
  - name: load
    sql: models/load.sql
    depends_on: [gleif_raw]

  # ── Package: materialise the terminal table (adds the search corpus) ─────────────
  - name: package
    sql: models/package.sql
    produces: [gleif_out]

  # ── Export: write the terminal Parquet the publish seam consumes ─────────────────
  # parquet_export replaces package.sql's old `COPY … (COMPRESSION zstd)` — a first-class
  # produced asset the engine orders + stale-propagates. The TOTAL order_by (lei is
  # unique) makes the bytes reproducible for a given golden-copy snapshot.
  - name: export_gleif
    op: parquet_export@1
    with:
      input: gleif_out
      dest: build/gleif.parquet
      compression: zstd
      order_by: "country, legal_name, lei"

  # ── Describe: EMIT datapackage.json from the built Parquet ───────────────────────
  # finetype types every column; descriptor.overrides.json overlays the curated half
  # (identity, licenses, sources, per-field prose, primaryKey). Hard-fails on drift.
  - name: describe
    op: datapackage_describe@1
    with:
      parquet: build/gleif.parquet
      overrides: descriptor.overrides.json
      out: datapackage.json

  # ── Validate: GATE the built Parquet against the self-derived finetype contract ──
  # finetype_validate (CHECK-ONLY) checks the terminal Parquet against schema.finetype.json
  # (self-derived from THIS Parquet — see its $comment). Pass-through on the snapshot it
  # was derived from, a fail-closed drift tripwire for future Runs; writes nothing, so
  # build/gleif.parquet is untouched.
  #
  # NOTE — unlike edgar / edgar_gleif / naics, schema.finetype.json is NOT checked in
  # yet: deriving it needs the ~470 MB golden-copy Parquet, and the GLEIF download is
  # bandwidth-throttled (~100 KB/s) where this was built, so the first Run has not yet
  # produced it. Generate it once on the first successful Run, identically to the other
  # datasets, then commit it:
  #   finetype profile -f build/gleif.parquet -o json-schema --stats \
  #     | jq 'del(.properties[].pattern)' > schema.finetype.json
  - name: validate
    op: finetype_validate@1
    with:
      parquet: build/gleif.parquet
      schema: schema.finetype.json

  # publish: the out-of-repo publish pipeline reads build/gleif.parquet + the emitted
  # datapackage.json (boundary — not an arc step). See README.
