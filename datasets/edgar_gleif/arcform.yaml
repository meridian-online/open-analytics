# The EDGAR ↔ GLEIF crosswalk Protocol — the reproducible *definition* of how the
# `crosswalk.edgar_gleif` Dataset is made. `arc run` executes this manifest; one Run
# → one Dataset version (the freshness lever). See ./README.md (the Protocol primitive).
#
# BOUNDARY — do NOT fold these into this manifest:
#   • the arcform ENGINE and the `splink_resolve` OPERATOR live in the `arcform`
#     repo; this manifest only REFERENCES the operator (see the `resolve` step).
#     A typed-operator registry that resolves operators by name+version is
#     greenfield — for now the step calls the script by path.
#   • PUBLISH (content-addressed R2 upload + manifest/catalog pointer flip) stays in
#     the out-of-repo publish pipeline and READS this Protocol's terminal output,
#     build/edgar_gleif.parquet. It is not an arcform step.
#
# Produces: build/edgar_gleif.parquet  →  published as crosswalk.edgar_gleif
name: edgar_gleif
engine: duckdb
engine_version: ">=1.2"
db: build/edgar_gleif.db

params:
  # Stamped on every row. Pin at run time: arc run --param as_of=2026-07-12
  as_of:
    default: ""
  # The arcform operator library (sibling repo). Path-based until the typed-operator
  # registry (name+version resolution) exists.
  operators_dir:
    default: "../../../arcform/operators"

# Transient API/network blips shouldn't sink a run — retry fetches with backoff.
defaults:
  retry:
    max_attempts: 3
    backoff_sec: 2.0

steps:
  # ── Inputs: the published source Datasets (content-addressed openlake) ─────────
  - name: fetch_edgar
    command: "mkdir -p build && curl -fsSL https://openlake.meridian.online/edgar.parquet -o build/edgar.parquet"
    produces: [edgar_src]
    preconditions:
      - modified_after: { path: build/edgar.parquet, period: 24h }
  - name: fetch_gleif
    command: "mkdir -p build && curl -fsSL https://openlake.meridian.online/gleif.parquet -o build/gleif.parquet"
    produces: [gleif_src]
    preconditions:
      - modified_after: { path: build/gleif.parquet, period: 24h }

  # ── Deterministic backbone: authoritative CIK/series ↔ LEI (no guessing) ───────
  # Official sources ONLY (SEC + GLEIF) — no crowd-sourced data in the published
  # pipeline. Authority provides the link for funds; operating companies have no
  # official CIK↔LEI, so they are resolved (name match) below.
  - name: fetch_gleif_sec_registrations
    # GLEIF entities registered at SEC EDGAR (RA000665): LEI + registeredAs (numeric
    # CIK for operating cos, S…/C… series/class for funds) + entity.category. ~all funds.
    command: "mkdir -p build && bash scripts/fetch_gleif_ra.sh RA000665 build/gleif_ra_sec.csv"
    produces: [gleif_ra_sec]
    preconditions:
      - modified_after: { path: build/gleif_ra_sec.csv, period: 168h }
  - name: fetch_ncen
    # SEC Form N-CEN (the annual fund filing itself — the most direct authority).
    # REGISTRANT.tsv → registrant CIK ↔ LEI; FUND_REPORTED_INFO.tsv → series
    # SERIES_ID ↔ LEI (~100% LEI fill). ~4 recent quarters cover the fund universe.
    command: "mkdir -p build && bash scripts/fetch_ncen.sh 4 build/ncen"
    produces: [ncen]
    preconditions:
      - modified_after: { path: build/ncen, period: 168h }

  # ── Load + normalize ───────────────────────────────────────────────────────────
  - name: load
    sql: models/load.sql
    depends_on: [edgar_src, gleif_src, gleif_ra_sec, ncen]

  # ── Resolve: probabilistic name match for the operating-company tail ───────────
  - name: resolve
    # Opaque command step today — first-class typed operators are greenfield. Frozen
    # Fellegi-Sunter/Splink model (SEED=42, precision-first). Emits cik/ticker/
    # company_name/lei/legal_name/jurisdiction/reg_status/match_weight/
    # match_probability/method/status. NOTE: at the ~500k-entity scale, the operator's
    # blocking rules must be tuned (empty-name + "THE"/"STICHTING" hotspots) and
    # country used as a blocking dimension — see README "Scale & frontier".
    command: "uv run --script ../../../arcform/operators/splink_resolve/resolve.py --edgar build/edgar.parquet --gleif build/gleif.parquet --out build/resolved.parquet"
    produces: [resolved]
    depends_on: [edgar_src, gleif_src]
    timeout_sec: 7200

  # ── Tier: deterministic (authoritative) ∪ splink (confirmed/candidate) ─────────
  - name: tier
    sql: models/tier.sql
    depends_on: [resolved]

  # ── Package: the terminal Parquet output (adds as_of + corpus, zstd) ───────────
  - name: package
    sql: models/package.sql

  # ── Describe: EMIT datapackage.json from the built Parquet ─────────────────────
  # Retires the hand-checked descriptor. `finetype profile ... -o datapackage` reads
  # build/edgar_gleif.parquet and types every column from its taxonomy — the
  # machine-decidable half: per-field `type`/`format`, the `x-finetype-*` semantic
  # labels + observed constraints, and the resource bytes/hash/format. scripts/
  # describe.py then overlays descriptor.overrides.json — the hand-curated half
  # finetype CANNOT infer: the package title/description/licenses/sources, the
  # published resource `path`, per-field prose descriptions, and the relational
  # metadata (primaryKey + foreignKeys with their x-evidence/x-confidence/x-status).
  # Overrides win; finetype fills the rest. FINETYPE GAP: it emits one typed Data
  # Resource and nothing above the field level (no package identity, no edges, no
  # evidence), and its labels are only as good as the installed finetype — see
  # README "Describe". Runs after `package`; hard-fails if a curated key references a
  # column not in the Parquet (that drift is exactly what this step exists to catch).
  - name: describe
    command: "uv run --script scripts/describe.py --parquet build/edgar_gleif.parquet --overrides descriptor.overrides.json --out datapackage.json"

  # publish: the out-of-repo publish pipeline reads build/edgar_gleif.parquet and this
  # emitted datapackage.json (boundary — not an arcform step). See README.
