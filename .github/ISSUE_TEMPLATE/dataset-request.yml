name: Dataset request
description: Tell us what public data you keep reaching for.
title: "Dataset request: "
labels: ["dataset-request"]
body:
  - type: textarea
    id: request
    attributes:
      label: What dataset do you need?
      description: Name it as precisely as you can — the source organisation and the specific file or table if you know it.
      placeholder: e.g. UK Companies House basic company data, HS commodity codes, HUD ZIP–tract crosswalk…
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Source URL
      description: Where does the official data live today?
      placeholder: https://…
  - type: textarea
    id: use
    attributes:
      label: What would you do with it?
      description: One or two sentences. This is how we prioritise — real use cases jump the queue.
    validations:
      required: true
  - type: input
    id: cadence
    attributes:
      label: How fresh does it need to be?
      placeholder: e.g. monthly is fine / needs to track the daily source release
